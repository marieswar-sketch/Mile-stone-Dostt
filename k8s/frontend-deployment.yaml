apiVersion: v1
kind: ConfigMap
metadata:
  name: dostt-nginx-config
  namespace: default
data:
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # Serve static files; fall back to index.html for SPA routing
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy /api/* → backend service (strip /api prefix)
      location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://dostt-backend-svc:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }

      gzip on;
      gzip_types text/plain text/css application/javascript application/json;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dostt-frontend
  namespace: default
  labels:
    app: dostt-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dostt-frontend
  template:
    metadata:
      labels:
        app: dostt-frontend
    spec:
      containers:
        - name: frontend
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: static-files
          # In production: build a Docker image with the static files baked in.
          # Replace this with an emptyDir + initContainer or a custom image.
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: dostt-nginx-config
